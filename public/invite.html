<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voltlead — Accept Invitation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 14px; border: 1px solid #e0e0e0; padding: 2.5rem; width: 380px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
    .logo { font-size: 26px; font-weight: 800; color: #1D9E75; margin-bottom: 4px; }
    .logo span { color: #111; }
    .greeting { font-size: 20px; font-weight: 700; margin: 1.2rem 0 6px; }
    .sub { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
    input { width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 10px; outline: none; }
    input:focus { border-color: #1D9E75; }
    button { width: 100%; padding: 12px; background: #1D9E75; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:hover { background: #0F6E56; }
    .msg { font-size: 14px; margin-top: 12px; }
    .msg.error { color: #c0392b; }
    .msg.success { color: #0F6E56; }
    .invalid { text-align: center; padding: 2rem; }
    .invalid h2 { color: #c0392b; margin-bottom: 8px; }
    .invalid p { color: #888; font-size: 14px; }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">⚡ Volt<span>lead</span></div>
  <div id="content"><p style="color:#aaa;margin-top:1rem">Loading...</p></div>
</div>
<script>
  const SERVER_URL = 'https://lead-claim-server-production.up.railway.app';
  const token = new URLSearchParams(window.location.search).get('token');

  async function init() {
    if (!token) { showInvalid(); return; }
    try {
      const res = await fetch(`${SERVER_URL}/rep/invite/${token}`);
      const data = await res.json();
      if (!res.ok) { showInvalid(); return; }
      document.getElementById('content').innerHTML = `
        <div class="greeting">Welcome, ${data.name}!</div>
        <div class="sub">Set a password to access your Voltlead account</div>
        <input type="email" value="${data.email}" disabled style="background:#f5f5f5;color:#888" />
        <input type="password" id="pw" placeholder="Choose a password (min 6 chars)" />
        <input type="password" id="pw2" placeholder="Confirm password" />
        <button onclick="accept()">Set Password & Sign In</button>
        <div class="msg" id="msg"></div>
      `;
    } catch(e) { showInvalid(); }
  }

  async function accept() {
    const pw = document.getElementById('pw').value;
    const pw2 = document.getElementById('pw2').value;
    const msg = document.getElementById('msg');
    if (!pw || pw.length < 6) { msg.className = 'msg error'; msg.textContent = 'Password must be at least 6 characters'; return; }
    if (pw !== pw2) { msg.className = 'msg error'; msg.textContent = 'Passwords do not match'; return; }
    try {
      const res = await fetch(`${SERVER_URL}/rep/invite/${token}/accept`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      const data = await res.json();
      if (res.ok) {
        msg.className = 'msg success';
        msg.textContent = '✅ Password set! Redirecting to login...';
        setTimeout(() => window.location.href = '/', 2000);
      } else {
        msg.className = 'msg error'; msg.textContent = data.error;
      }
    } catch(e) { msg.className = 'msg error'; msg.textContent = 'Error — please try again'; }
  }

  function showInvalid() {
    document.getElementById('content').innerHTML = `
      <div class="invalid">
        <h2>Invalid or Expired Link</h2>
        <p>This invitation link is no longer valid. Please ask your admin to resend the invitation.</p>
      </div>
    `;
  }

  init();
</script>
</body>
</html>
